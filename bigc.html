<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6c945">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="บิ๊กซีพัทยากลาง">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <title>บิ๊กซีพัทยากลาง | รายจ่าย</title>
  <style>
    :root {
      --primary: #f2b705;
      --primary-dark: #8a5b00;
      --accent: #1f7a8c;
      --danger: #d93d3d;
      --ink: #1d2939;
      --muted: #667085;
      --line: #e5d6a8;
      --bg: #fff7d6;
      --panel: #fffdf4;
      --soft: #fff1a8;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { min-height: 100%; background: var(--bg); overscroll-behavior: none; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Noto Sans Thai", sans-serif;
      padding: calc(12px + env(safe-area-inset-top)) 10px calc(110px + env(safe-area-inset-bottom));
      -webkit-tap-highlight-color: transparent;
    }
    main { max-width: 880px; margin: 0 auto; }
    .app-switcher-toggle {
      position: fixed;
      top: calc(10px + env(safe-area-inset-top));
      left: 10px;
      z-index: 10020;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(31, 41, 55, 0.14);
      font-size: 1.45rem;
      font-weight: 900;
      cursor: pointer;
    }
    .app-switcher-backdrop {
      position: fixed;
      inset: 0;
      z-index: 10010;
      background: rgba(15, 23, 42, 0.38);
      backdrop-filter: blur(2px);
    }
    .app-switcher-panel {
      position: fixed;
      top: calc(62px + env(safe-area-inset-top));
      left: 10px;
      z-index: 10021;
      width: min(310px, calc(100vw - 20px));
      background: #fff;
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 16px 44px rgba(15, 23, 42, 0.24);
    }
    .app-switcher-title { padding: 8px 10px 10px; color: var(--muted); font-size: .85rem; font-weight: 800; }
    .app-switcher-panel a {
      display: block;
      padding: 13px 12px;
      border-radius: 12px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 900;
    }
    .app-switcher-panel a.active { background: var(--soft); color: var(--primary-dark); }
    .app-switcher-panel a + a { margin-top: 4px; }
    .app-switcher-hidden { display: none !important; }
    .topbar {
      min-height: 64px;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    h1 {
      grid-column: 2;
      margin: 0;
      text-align: center;
      color: var(--primary-dark);
      font-size: 1.35rem;
      line-height: 1.2;
    }
    .settings-btn {
      grid-column: 3;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(31, 41, 55, 0.10);
      font-size: 1.2rem;
      cursor: pointer;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 8px 28px rgba(98, 75, 10, 0.08);
    }
    .date-panel { display: grid; grid-template-columns: 1fr; gap: 8px; }
    label { display: block; font-size: .8rem; font-weight: 900; color: var(--primary-dark); margin-bottom: 5px; }
    input, select, textarea {
      width: 100%;
      border: 1px solid #d8c37b;
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font-size: 16px;
      padding: 11px;
      outline: none;
    }
    input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(242, 183, 5, .18); }
    .section-title {
      margin: 0 0 10px;
      color: var(--ink);
      border-left: 5px solid var(--primary);
      padding-left: 8px;
      font-size: 1rem;
    }
    .expense-list { display: grid; gap: 8px; }
    .expense-row {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(64px, .55fr) minmax(72px, .65fr) minmax(84px, .7fr) 42px;
      gap: 7px;
      align-items: start;
      background: #fff9df;
      border: 1px solid #ead99a;
      border-radius: 12px;
      padding: 8px;
    }
    .expense-row .note { grid-column: 1 / 5; }
    .expense-row .type-hint {
      grid-column: 1 / 5;
      display: none;
      color: #795a05;
      background: #fff3bd;
      border-radius: 9px;
      padding: 7px 9px;
      font-size: .78rem;
      font-weight: 800;
    }
    .expense-row .type-hint.active { display: block; }
    .delete-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 10px;
      background: #fff0ef;
      color: var(--danger);
      font-weight: 900;
      cursor: pointer;
    }
    .autocomplete-items {
      position: absolute;
      z-index: 10030;
      background: #fff;
      border: 1px solid #d8c37b;
      border-radius: 12px;
      max-height: 250px;
      overflow-y: auto;
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.18);
    }
    .autocomplete-items div { padding: 13px; cursor: pointer; border-bottom: 1px solid #f0e6bd; font-weight: 800; }
    .actions { position: fixed; left: 0; right: 0; bottom: 0; padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); background: rgba(255, 247, 214, .92); backdrop-filter: blur(10px); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; z-index: 80; }
    .btn {
      border: none;
      border-radius: 13px;
      padding: 14px 12px;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
    }
    .btn-secondary { background: #fff; color: var(--primary-dark); border: 1px solid var(--line); }
    .btn-primary { background: var(--primary); color: #2a1f00; }
    .btn-danger { background: #fff1f0; color: var(--danger); border: 1px solid #ffd0cc; }
    .status { min-height: 22px; font-size: .86rem; color: var(--muted); font-weight: 800; margin-top: 8px; }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 20000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, .38);
      backdrop-filter: blur(3px);
      padding: 20px;
    }
    .overlay-card {
      width: min(420px, 100%);
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(15, 23, 42, .24);
    }
    .hidden { display: none !important; }
    @media (max-width: 520px) {
      .expense-row { grid-template-columns: minmax(0, 1.25fr) 62px 70px 82px 38px; gap: 6px; padding: 7px; }
      .expense-row input { padding: 10px 8px; font-size: 15px; }
      .delete-btn { width: 38px; height: 40px; }
    }
  </style>
</head>
<body>
  <button class="app-switcher-toggle" type="button" onclick="toggleAppSwitcher()" aria-label="เปิดเมนูระบบ">☰</button>
  <div id="appSwitcherBackdrop" class="app-switcher-backdrop app-switcher-hidden" onclick="closeAppSwitcher()"></div>
  <nav id="appSwitcherPanel" class="app-switcher-panel app-switcher-hidden" aria-label="เมนูระบบ">
    <div class="app-switcher-title">เลือกใช้งาน</div>
    <a href="./tawana.html">ทาวน่า</a>
    <a class="active" href="./bigc.html">บิ๊กซีพัทยากลาง</a>
    <a href="./bigc-order.html">รายการเบิกของบิ๊กซีพัทยากลาง</a>
    <a href="./dashboard.html">Dashboard</a>
    <a href="./index.html">หน้ารวม</a>
  </nav>

  <main>
    <div class="topbar">
      <h1>บิ๊กซีพัทยากลาง รายจ่าย</h1>
      <button class="settings-btn" type="button" onclick="pullItems(true)" aria-label="อัปเดตรายการ">↻</button>
    </div>

    <section class="panel date-panel">
      <div>
        <label for="mainDate">วันที่</label>
        <input type="date" id="mainDate" onchange="loadData()">
      </div>
      <div id="pageStatus" class="status"></div>
    </section>

    <section class="panel">
      <h2 class="section-title">รายจ่าย</h2>
      <div id="expenseList" class="expense-list"></div>
      <button class="btn btn-secondary" type="button" style="width:100%; margin-top:10px;" onclick="addRow()">+ เพิ่มบรรทัด</button>
    </section>
  </main>

  <div class="actions">
    <button class="btn btn-danger" type="button" onclick="clearAllData()">ล้างข้อมูล</button>
    <button class="btn btn-primary" type="button" onclick="submitExpenses()">บันทึกรายจ่าย</button>
  </div>

  <div id="loadingOverlay" class="overlay hidden">
    <div class="overlay-card">
      <h2 style="margin:0 0 8px;">กำลังโหลด</h2>
      <div id="loadingText" class="status" style="margin:0;">รอสักครู่</div>
    </div>
  </div>

  <div id="lockedOverlay" class="overlay hidden">
    <div class="overlay-card">
      <h2 style="margin:0 0 8px; color:var(--primary-dark);">วันนี้บันทึกแล้ว</h2>
      <p style="margin:0 0 14px; color:var(--muted);">ถ้าต้องการแก้ไข กดปลดล็อกแล้วบันทึกใหม่</p>
      <button class="btn btn-secondary" type="button" style="width:100%;" onclick="unlockDate()">ปลดล็อกแก้ไข</button>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzgShPP4BpUUvDSs53esvJLru3CFAe1tM4LqdXE9rUzENbBNBFY3lPPqjVw6fnhgEKmGw/exec";
    const STORAGE_ITEMS = "BOY_BIGC_EXPENSE_ITEMS";
    const STORAGE_META = "BOY_BIGC_EXPENSE_META";

    let itemDict = {};
    let itemMetaDict = {};
    let timer = null;
    let appStarted = false;
    let isLoadingData = false;
    let rowCounter = 0;

    function closeAppSwitcher() {
      document.getElementById('appSwitcherBackdrop').classList.add('app-switcher-hidden');
      document.getElementById('appSwitcherPanel').classList.add('app-switcher-hidden');
    }

    function toggleAppSwitcher() {
      document.getElementById('appSwitcherBackdrop').classList.toggle('app-switcher-hidden');
      document.getElementById('appSwitcherPanel').classList.toggle('app-switcher-hidden');
    }

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') closeAppSwitcher();
    });

    function setStatus(text) {
      document.getElementById('pageStatus').textContent = text || '';
    }

    function showLoading(text) {
      document.getElementById('loadingText').textContent = text || 'รอสักครู่';
      document.getElementById('loadingOverlay').classList.remove('hidden');
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').classList.add('hidden');
    }

    async function apiCall(action, data = {}) {
      const res = await fetch(WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, ...data })
      });
      const text = await res.text();
      let parsed;
      try {
        parsed = JSON.parse(text);
      } catch (e) {
        throw new Error('หลังบ้านตอบกลับผิดปกติ');
      }
      if (parsed.status === 'error') throw new Error(parsed.message || 'เกิดข้อผิดพลาด');
      return parsed;
    }

    function escapeHtml(value) {
      return String(value === null || value === undefined ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function safeParse(raw, fallback) {
      try { return raw ? JSON.parse(raw) : fallback; } catch (e) { return fallback; }
    }

    function uniqueUnitOptions(options) {
      const seen = {};
      const result = [];
      (options || []).forEach(function(unit) {
        const clean = String(unit || '').trim();
        if (clean && !seen[clean]) {
          seen[clean] = true;
          result.push(clean);
        }
      });
      return result;
    }

    function parseSharedItemName(displayName) {
      const text = String(displayName || '').trim();
      const match = text.match(/^(.*)\s+\(([^()]*)\)$/);
      if (!match) return { name: text, unit: '' };
      return { name: match[1].trim(), unit: match[2].trim() };
    }

    function setItemMeta(metaDict, name, unit, metaSource) {
      const cleanName = String(name || '').trim();
      const cleanUnit = String(unit || '').trim();
      if (!cleanName) return;
      const source = metaSource || {};
      const baseUnit = String(source.baseUnit || source.unit || cleanUnit || '').trim();
      const primaryUnit = String(source.primaryUnit || '').trim();
      const conversionRate = Number(source.conversionRate || source.conversion || 1);
      const unitOptions = uniqueUnitOptions(source.unitOptions || [baseUnit, primaryUnit, cleanUnit]);
      const meta = {
        mainType: String(source.mainType || '').trim(),
        subType: String(source.subType || '').trim(),
        unit: baseUnit || cleanUnit,
        baseUnit: baseUnit || cleanUnit,
        primaryUnit,
        conversionRate: isFinite(conversionRate) && conversionRate > 0 ? conversionRate : 1,
        unitOptions,
        unitDetail: String(source.unitDetail || '').trim()
      };
      metaDict[cleanName] = meta;
      unitOptions.forEach(function(option) { metaDict[cleanName + '||' + option] = meta; });
    }

    function applyItemDict(dict, meta) {
      itemDict = dict || {};
      itemMetaDict = meta || {};
      localStorage.setItem(STORAGE_ITEMS, JSON.stringify(itemDict));
      localStorage.setItem(STORAGE_META, JSON.stringify(itemMetaDict));
    }

    async function pullItems(manual) {
      if (manual) setStatus('กำลังอัปเดตรายการ...');
      try {
        const sharedData = await apiCall('shared_loadDB');
        const categories = sharedData && sharedData.database && sharedData.database.categories;
        const itemMeta = sharedData && sharedData.database && sharedData.database.itemMeta || {};
        const dict = {};
        const meta = {};
        Object.keys(categories || {}).forEach(function(category) {
          (categories[category] || []).forEach(function(displayName) {
            const parsed = parseSharedItemName(displayName);
            if (parsed.name) dict[parsed.name] = parsed.unit;
            const source = itemMeta[displayName] || itemMeta[parsed.name] || {};
            setItemMeta(meta, parsed.name, parsed.unit, source);
          });
        });
        if (Object.keys(dict).length) {
          applyItemDict(dict, meta);
          refreshAllUnitOptions();
          setStatus('อัปเดตรายการแล้ว ' + Object.keys(dict).length + ' รายการ');
        }
      } catch (e) {
        if (manual) alert('อัปเดตรายการไม่สำเร็จ: ' + e.message);
      }
    }

    function getExpenseMeta(name, unit) {
      const cleanName = String(name || '').trim();
      const cleanUnit = String(unit || '').trim();
      return itemMetaDict[cleanName + '||' + cleanUnit] || itemMetaDict[cleanName] || {};
    }

    function getUnitOptionsForItem(name, currentUnit) {
      const meta = getExpenseMeta(name, currentUnit);
      const fallbackUnit = itemDict[String(name || '').trim()] || currentUnit;
      return uniqueUnitOptions((meta.unitOptions || []).concat([fallbackUnit]));
    }

    function updateUnitOptions(row) {
      if (!row) return;
      const itemInput = row.querySelector('.item');
      const unitInput = row.querySelector('.unit');
      const hint = row.querySelector('.type-hint');
      const datalist = document.getElementById(unitInput.getAttribute('list'));
      const options = getUnitOptionsForItem(itemInput.value, unitInput.value);
      datalist.innerHTML = options.map(function(option) {
        return '<option value="' + escapeHtml(option) + '"></option>';
      }).join('');
      if (!unitInput.value && options.length) unitInput.value = options[0];
      const meta = getExpenseMeta(itemInput.value, unitInput.value);
      if (meta.mainType || meta.subType) {
        hint.textContent = [meta.mainType, meta.subType].filter(Boolean).join(' / ');
        hint.classList.add('active');
      } else {
        hint.textContent = '';
        hint.classList.remove('active');
      }
    }

    function refreshAllUnitOptions() {
      document.querySelectorAll('.expense-row').forEach(updateUnitOptions);
    }

    function closeAllLists() {
      document.querySelectorAll('.autocomplete-items').forEach(function(el) { el.remove(); });
    }

    function showSuggestions(input) {
      const value = input.value.trim().toLowerCase();
      closeAllLists();
      const box = document.createElement('div');
      box.className = 'autocomplete-items';
      const rect = input.getBoundingClientRect();
      box.style.top = (rect.bottom + window.scrollY) + 'px';
      box.style.left = (rect.left + window.scrollX) + 'px';
      box.style.width = rect.width + 'px';
      document.body.appendChild(box);

      let count = 0;
      Object.keys(itemDict).forEach(function(key) {
        if (count > 18) return;
        if (!value || key.toLowerCase().indexOf(value) > -1) {
          const option = document.createElement('div');
          option.textContent = key;
          option.addEventListener('click', function() {
            input.value = key;
            closeAllLists();
            checkAutoFill(input);
            const qty = input.closest('.expense-row').querySelector('.qty');
            if (qty) qty.focus();
          });
          box.appendChild(option);
          count++;
        }
      });
      if (count === 0) closeAllLists();
    }

    document.addEventListener('click', function(event) {
      if (!event.target.classList.contains('item')) closeAllLists();
    });

    function checkAutoFill(input) {
      const row = input.closest('.expense-row');
      const unitInput = row.querySelector('.unit');
      const itemName = input.value.trim();
      if (!unitInput.value && itemDict[itemName]) unitInput.value = itemDict[itemName];
      updateUnitOptions(row);
      doSync();
    }

    function nav(event, index) {
      if (event.key !== 'Enter') return;
      event.preventDefault();
      closeAllLists();
      const row = event.target.closest('.expense-row');
      const inputs = row.querySelectorAll('input');
      if (index < inputs.length - 1) {
        inputs[index + 1].focus();
        return;
      }
      const next = row.nextElementSibling;
      if (next) next.querySelector('.item').focus();
      else addRow().querySelector('.item').focus();
    }

    function addRow(i = '', q = '', u = '', p = '', n = '') {
      rowCounter++;
      const unitListId = 'unitOptions_' + rowCounter;
      const row = document.createElement('div');
      row.className = 'expense-row';
      row.innerHTML = `
        <input class="item" type="text" placeholder="รายการ" value="${escapeHtml(i)}" autocomplete="off" oninput="showSuggestions(this)" onclick="showSuggestions(this)" onchange="checkAutoFill(this)" onkeydown="nav(event, 0)">
        <input class="qty" type="number" inputmode="decimal" placeholder="จำนวน" value="${escapeHtml(q)}" onchange="doSync()" onkeydown="nav(event, 1)">
        <input class="unit" type="text" placeholder="หน่วย" value="${escapeHtml(u)}" list="${unitListId}" onchange="updateUnitOptions(this.closest('.expense-row')); doSync()" onkeydown="nav(event, 2)">
        <datalist id="${unitListId}"></datalist>
        <input class="amount" type="number" inputmode="decimal" placeholder="บาท" value="${escapeHtml(p)}" onchange="doSync()" onkeydown="nav(event, 3)">
        <button class="delete-btn" type="button" onclick="removeRow(this)">×</button>
        <input class="note" type="text" placeholder="หมายเหตุ" value="${escapeHtml(n)}" onchange="doSync()" onkeydown="nav(event, 4)">
        <div class="type-hint"></div>
      `;
      document.getElementById('expenseList').appendChild(row);
      updateUnitOptions(row);
      return row;
    }

    function removeRow(btn) {
      btn.closest('.expense-row').remove();
      doSync();
    }

    function collectSnapshot() {
      const exp = [];
      document.querySelectorAll('.expense-row').forEach(function(row) {
        const item = row.querySelector('.item').value.trim();
        const qty = row.querySelector('.qty').value;
        const unit = row.querySelector('.unit').value.trim();
        const amount = row.querySelector('.amount').value;
        const note = row.querySelector('.note').value.trim();
        if (!item && !qty && !unit && !amount && !note) return;
        const meta = getExpenseMeta(item, unit);
        exp.push({
          i: item,
          q: qty,
          u: unit,
          p: amount,
          n: note,
          m: meta.mainType || '',
          t: meta.subType || ''
        });
      });
      return { exp };
    }

    function renderSnapshot(snapshot) {
      document.getElementById('expenseList').innerHTML = '';
      const rows = snapshot && Array.isArray(snapshot.exp) ? snapshot.exp : [];
      if (rows.length) {
        rows.forEach(function(row) { addRow(row.i, row.q, row.u, row.p, row.n); });
        addRow();
      } else {
        for (let i = 0; i < 4; i++) addRow();
      }
    }

    function doSync() {
      if (isLoadingData) return;
      clearTimeout(timer);
      const date = document.getElementById('mainDate').value;
      if (!date) return;
      const data = collectSnapshot();
      timer = setTimeout(function() {
        apiCall('bigcExpenseAutoSave', { date, data }).catch(function() {});
      }, 500);
    }

    async function loadData() {
      const date = document.getElementById('mainDate').value;
      if (!date) return;
      clearTimeout(timer);
      isLoadingData = true;
      showLoading('กำลังโหลดรายจ่ายบิ๊กซีพัทยากลาง');
      try {
        const res = await apiCall('bigcExpenseLoadData', { date });
        const snapshot = safeParse(res.draft, {});
        renderSnapshot(snapshot);
        if (res.submitted) document.getElementById('lockedOverlay').classList.remove('hidden');
        else document.getElementById('lockedOverlay').classList.add('hidden');
        setStatus(res.submitted ? 'วันนี้มีข้อมูลที่บันทึกแล้ว' : 'พร้อมบันทึกรายจ่ายบิ๊กซีพัทยากลาง');
      } catch (e) {
        alert('โหลดข้อมูลไม่สำเร็จ: ' + e.message);
      } finally {
        isLoadingData = false;
        hideLoading();
      }
    }

    async function submitExpenses() {
      const date = document.getElementById('mainDate').value;
      if (!date) return alert('กรุณาเลือกวันที่');
      const data = collectSnapshot();
      if (!data.exp.length) return alert('ยังไม่มีรายการรายจ่าย');
      clearTimeout(timer);
      showLoading('กำลังบันทึกรายจ่ายบิ๊กซีพัทยากลาง');
      try {
        const res = await apiCall('bigcExpenseSubmit', { date, data });
        if (res.status !== 'Success') throw new Error(res.message || res.status || 'บันทึกไม่สำเร็จ');
        document.getElementById('lockedOverlay').classList.remove('hidden');
        setStatus('บันทึกแล้ว');
        alert('บันทึกรายจ่ายบิ๊กซีพัทยากลางเรียบร้อย');
      } catch (e) {
        alert('บันทึกไม่สำเร็จ: ' + e.message);
      } finally {
        hideLoading();
      }
    }

    async function unlockDate() {
      const date = document.getElementById('mainDate').value;
      if (!date) return;
      try {
        await apiCall('bigcExpenseUnlockDate', { date });
        document.getElementById('lockedOverlay').classList.add('hidden');
        setStatus('ปลดล็อกแล้ว แก้ไขแล้วกดบันทึกใหม่');
      } catch (e) {
        alert('ปลดล็อกไม่สำเร็จ: ' + e.message);
      }
    }

    function clearAllData() {
      if (!confirm('ล้างข้อมูลที่กรอกอยู่?')) return;
      document.getElementById('expenseList').innerHTML = '';
      for (let i = 0; i < 4; i++) addRow();
      doSync();
    }

    function initApp() {
      if (appStarted) return;
      appStarted = true;
      itemDict = safeParse(localStorage.getItem(STORAGE_ITEMS), {});
      itemMetaDict = safeParse(localStorage.getItem(STORAGE_META), {});
      const today = new Date();
      document.getElementById('mainDate').value = today.toISOString().slice(0, 10);
      loadData().finally(function() { pullItems(false); });
    }

    window.addEventListener('load', initApp);
  </script>
</body>
</html>
